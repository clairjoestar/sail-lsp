name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            windows: false
          - os: macos-latest
            target: x86_64-apple-darwin
            windows: false
          - os: macos-latest
            target: aarch64-apple-darwin
            windows: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            windows: true

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release -p sail_server --target ${{ matrix.target }}

      - name: Prepare artifact (unix)
        if: matrix.windows == false
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/sail_server" "dist/sail-lsp-${{ matrix.target }}"

      - name: Prepare artifact (windows)
        if: matrix.windows == true
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/sail_server.exe" "dist/sail-lsp-${{ matrix.target }}.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: sail-lsp-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
